<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafioso AI 2.6</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body { background:#0a0a0a; color:#fff; font-family:sans-serif; text-align:center; }
        .card { background:#151515; border:1px solid gold; padding:15px; border-radius:12px; margin:10px auto; max-width:500px;}
        button { background:gold; color:black; padding:12px; border:none; border-radius:8px; width:90%; margin:5px;}
        input,textarea { background:#222; color:#fff; border:1px solid #444; padding:10px; width:90%; }
    </style>
</head>

<body>

<div id="home">
    <h1>🕵️‍♂️ MAFIOSO AI</h1>
    <button onclick="createRoom()">بوس 👑</button>
    <input id="playerName" placeholder="اسمك">
    <input id="roomCodeInput" placeholder="الكود">
    <button onclick="joinRoom()">دخول 👤</button>
</div>

<div id="waitingScreen" style="display:none">
    <div class="card">انتظر البوس...</div>
</div>

<div id="bossPanel" style="display:none">
    <h2 id="roomDisplay"></h2>

    <div id="setup">
        <div class="card">
            <input id="crimeType" placeholder="نوع الجريمة">
            <textarea id="tricks"></textarea>
            <div id="pList"></div>
            <button onclick="startGame()">ابدأ</button>
        </div>
    </div>

    <div id="bossInGame" style="display:none;">
        <div class="card">
            <p id="bossStoryDisplay"></p>
            <p id="roundDisplay"></p>
            <p id="currentHint"></p>

            <button onclick="startVoting()">بدء التصويت 🗳️</button>
            <button onclick="executeKill()">تنفيذ الحكم 💀</button>
            <button onclick="nextRound()">جولة جديدة 🔄</button>
            <button onclick="getHint()">طلب هنت 🧠</button>
        </div>

        <div id="bossSecrets" class="card"></div>
    </div>
</div>

<div id="playerPanel" style="display:none">
    <div id="playerContent"></div>

    <div id="vUI" class="card" style="display:none;">
        <h3>صوّت:</h3>
        <div id="vBtns"></div>
    </div>
</div>

<script>
const socket = io();
let myCode = '';

function show(id){
    ['home','waitingScreen','bossPanel','playerPanel']
    .forEach(s=>document.getElementById(s).style.display='none');
    document.getElementById(id).style.display='block';
}

function createRoom(){ socket.emit('createRoom'); }

socket.on('roomCreated',(c)=>{
    myCode=c;
    show('bossPanel');
    document.getElementById('roomDisplay').innerText="كود: "+c;
});

function joinRoom(){
    const n=document.getElementById('playerName').value;
    const c=document.getElementById('roomCodeInput').value.toUpperCase();
    myCode=c;
    socket.emit('joinRoom',{roomCode:c,playerName:n});
}

socket.on('joinedSuccess',()=>show('waitingScreen'));

socket.on('updatePlayers',(ps)=>{
    document.getElementById('pList').innerHTML=
    ps.map(p=>`<span>${p.name}</span>`).join('');
});

function startGame(){
    socket.emit('startGame',{
        roomCode:myCode,
        crimeType:crimeType.value,
        tricks:tricks.value
    });
}

socket.on('gameData',(d)=>{
    show('playerPanel');

    document.getElementById('playerContent').innerHTML=`
    <div class="card">
        <h2>${d.charName}</h2>
        <p>${d.story}</p>
        <p>🤫 ${d.charSecret}</p>
        <h1>${d.role}</h1>
    </div>`;
});

socket.on('bossData',(d)=>{
    document.getElementById('setup').style.display='none';
    document.getElementById('bossInGame').style.display='block';
    document.getElementById('bossStoryDisplay').innerText=d.story;

    document.getElementById('bossSecrets').innerHTML=
    d.players.map(p=>`<p>${p.name} ⬅️ ${p.role}</p>`).join('');
});

socket.on('newHint',(d)=>{
    document.getElementById('currentHint').innerText=d.hint;
    document.getElementById('roundDisplay').innerText="Round: "+d.round;
});

socket.on('startVoting',(players)=>{
    const myName=document.getElementById('playerName').value;

    const filtered=players.filter(p=>p.name!==myName && p.alive);

    document.getElementById('vUI').style.display='block';
    document.getElementById('vBtns').innerHTML=
    filtered.map(p=>`<button onclick="vote('${p.name}')">${p.name}</button>`).join('');
});

function vote(name){
    socket.emit('vote',{roomCode:myCode,target:name});
    document.getElementById('vUI').style.display='none';
}

function startVoting(){ socket.emit('startVoting',myCode); }
function executeKill(){ socket.emit('executeKill',myCode); }
function nextRound(){ socket.emit('nextRound',myCode); }
function getHint(){ socket.emit('getHint',myCode); }

socket.on('playerKilled',(n)=>alert("💀 "+n));
socket.on('extraHint',(h)=>{
    document.getElementById('bossSecrets').innerHTML+=`<p>🧠 ${h}</p>`;
});
</script>

</body>
</html>
