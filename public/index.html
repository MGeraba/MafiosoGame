<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mafioso AI 4.0</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #fff;
    text-align: center;
    font-family: sans-serif;
}

.card {
    background: #111;
    border: 1px solid gold;
    padding: 20px;
    border-radius: 15px;
    margin: 10px auto;
    max-width: 500px;
}

button {
    background: gold;
    color: black;
    padding: 12px;
    border: none;
    margin: 5px;
    width: 90%;
}

.player-tag {
    background: #222;
    padding: 5px 10px;
    margin: 3px;
    display: inline-block;
}
</style>
</head>

<body>

<div id="home">
<h1>🎭 Mafioso AI</h1>
<button onclick="createRoom()">بوس 👑</button>
<input id="playerName" placeholder="اسمك">
<input id="roomCodeInput" placeholder="الكود">
<button onclick="joinRoom()">دخول</button>
</div>

<div id="waitingScreen" style="display:none">انتظر البوس...</div>

<div id="bossPanel" style="display:none">
<h2 id="roomDisplay"></h2>

<div id="setup">
<input id="crimeType" placeholder="نوع الجريمة">
<textarea id="tricks"></textarea>
<div id="pList"></div>
<button onclick="startGame()">ابدأ</button>
</div>

<div id="bossInGame" style="display:none">
<p id="story"></p>
<p id="round"></p>
<p id="hint"></p>

<button onclick="startVoting()">تصويت</button>
<button onclick="executeKill()">إعدام</button>
<button onclick="nextRound()">جولة جديدة</button>
<button onclick="getHint()">هنت</button>

<div id="secrets"></div>
</div>
</div>

<div id="playerPanel" style="display:none">
<div id="playerContent"></div>

<div id="voteUI" style="display:none">
<h3>صوّت:</h3>
<div id="voteBtns"></div>
</div>
</div>

<script>
const socket = io();
let code = '';

function show(x){
["home","waitingScreen","bossPanel","playerPanel"]
.forEach(i=>document.getElementById(i).style.display="none");
document.getElementById(x).style.display="block";
}

function createRoom(){ socket.emit('createRoom'); }

socket.on('roomCreated',(c)=>{
code=c;
show('bossPanel');
roomDisplay.innerText="كود: "+c;
});

function joinRoom(){
code=roomCodeInput.value.toUpperCase();
socket.emit('joinRoom',{roomCode:code,playerName:playerName.value});
}

socket.on('joinedSuccess',()=>show('waitingScreen'));

socket.on('updatePlayers',(p)=>{
pList.innerHTML=p.map(x=>`<span class="player-tag">${x.name}</span>`).join('');
});

function startGame(){
socket.emit('startGame',{roomCode:code,crimeType:crimeType.value,tricks:tricks.value});
}

socket.on('gameData',(d)=>{
show('playerPanel');
playerContent.innerHTML=`
<div class="card">
<h2>${d.charName}</h2>
<p>${d.story}</p>
<p>${d.secret}</p>
<h1>${d.role}</h1>
</div>`;
});

socket.on('bossData',(d)=>{
setup.style.display="none";
bossInGame.style.display="block";
story.innerText=d.story;

secrets.innerHTML=d.players.map(p=>`<p>${p.name} - ${p.role}</p>`).join('');
});

socket.on('newHint',(d)=>{
hint.innerText="🔍 "+d.hint;
round.innerText="Round "+d.round;
});

socket.on('startVoting',(players)=>{
const me=playerName.value;
const list=players.filter(p=>p.name!==me && p.alive);

voteUI.style.display="block";
voteBtns.innerHTML=list.map(p=>
`<button onclick="vote('${p.name}')">${p.name}</button>`).join('');
});

function vote(n){
socket.emit('vote',{roomCode:code,target:n});
voteUI.style.display="none";
}

function startVoting(){ socket.emit('startVoting',code); }
function executeKill(){ socket.emit('executeKill',code); }
function nextRound(){ socket.emit('nextRound',code); }
function getHint(){ socket.emit('getHint',code); }

socket.on('playerKilled',(n)=>alert("💀 "+n));
socket.on('extraHint',(h)=>secrets.innerHTML+=`<p>🧠 ${h}</p>`);
</script>

</body>
</html>
