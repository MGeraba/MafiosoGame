<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafioso AI - Boss Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; transition: 0.3s; }
        .card { background: #151515; border: 1px solid #d4af37; padding: 20px; border-radius: 12px; margin: 15px auto; max-width: 600px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1); }
        button { background: #d4af37; color: #000; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #ffdf00; }
        .timer { font-size: 35px; color: #ff4d4d; font-weight: bold; margin: 10px; }
        .panic-active { background: #600 !important; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        #bossPanel, #playerPanel, #gameUI { display: none; padding: 20px; }
        input, textarea { background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; width: 85%; margin: 10px; font-size: 16px; }
        .clue-box { color: #00ffcc; font-size: 1.2em; font-weight: bold; border: 2px dashed #00ffcc; padding: 10px; margin-top: 10px; }
        .vote-btn { background: #444; color: white; width: 45%; }
        .vote-btn:active { background: #d4af37; }
    </style>
</head>
<body>

    <div id="home">
        <h1>🕵️‍♂️ MAFIOSO AI</h1>
        <div class="card">
            <button onclick="createRoom()" style="width: 80%; font-size: 1.2em;">إنشاء غرفة (أنا البوس 👑)</button>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <input type="text" id="playerName" placeholder="اكتب اسمك الحقيقي">
            <input type="text" id="roomCodeInput" placeholder="كود الغرفة">
            <button onclick="joinRoom()" style="width: 80%;">انضمام كلاعب 👤</button>
        </div>
    </div>

    <div id="bossPanel">
        <h2 id="roomDisplay" style="color: gold;"></h2>
        
        <div id="setup">
            <div class="card">
                <h3>إعداد الجولة</h3>
                <input type="text" id="crimeType" placeholder="نوع الجريمة (مثلاً: سرقة بنك)">
                <textarea id="tricks" placeholder="تريكات القصة (مثلاً: القاتل لابس كاب أحمر)"></textarea>
                <div id="pList" style="margin: 10px; color: #aaa;">اللاعبين المنضمين: 0</div>
                <button onclick="startGame()" style="background: green; color: white; width: 90%;">ابدأ الجيم 🚀</button>
                <button onclick="closeRoom()" style="background: #444; color: white;">إغلاق الغرفة ❌</button>
            </div>
        </div>

        <div id="bossInGame" style="display:none;">
            <div class="card">
                <h3 id="roundTitle">الجولة 1</h3>
                <p id="bossStoryDisplay" style="color: #ddd; font-style: italic; border-bottom: 1px solid #333; padding-bottom: 10px;"></p>
                <div id="timerDisplay" class="timer">01:00</div>
                <button onclick="socket.emit('startTimer', myCode)" style="background: #28a745; color: white;">بدء العداد ⏱️</button>
                <button onclick="socket.emit('requestPhysicalClue', myCode)" style="background: #17a2b8; color: white;">طلب دليل (Hint) 🔍</button>
                <button onclick="socket.emit('triggerPanic', myCode)" style="background: #dc3545; color: white;">PANIC MODE 🚨</button>
            </div>

            <div class="card">
                <h4>كشف الأدوار (للبوس فقط):</h4>
                <div id="bossSecrets" style="text-align: right; font-size: 0.9em; color: #00ffcc;"></div>
            </div>

            <div class="card">
                <h4>📊 أصوات اللاعبين:</h4>
                <div id="vStats" style="color: gold; font-size: 1.1em;">انتظار الأصوات...</div>
                <button onclick="socket.emit('executePlayer', myCode)" style="background: red; color: white; width: 100%; margin-top: 15px; font-size: 1.2em;">تثبيت الإعدام 💀</button>
            </div>
            <button onclick="closeRoom()" style="background: #333; color: white; width: 50%;">إنهاء الجيم تماماً ❌</button>
        </div>
    </div>

    <div id="playerPanel">
        <div id="playerContent"></div>
        <div id="clueDisplay" class="clue-box" style="display:none;"></div>
        <div id="vUI" style="display:none;" class="card">
            <h3>من هو المافيا؟ (صوّت الآن)</h3>
            <div id="vBtns"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let myCode = '';

        // --- وظائف البداية ---
        function createRoom() { socket.emit('createRoom'); }
        
        socket.on('roomCreated', (c) => { 
            myCode = c; 
            document.getElementById('home').style.display='none'; 
            document.getElementById('bossPanel').style.display='block'; 
            document.getElementById('roomDisplay').innerText = "كود الغرفة: " + c;
        });

        function joinRoom() {
            const n = document.getElementById('playerName').value;
            const c = document.getElementById('roomCodeInput').value;
            if(!n || !c) return alert("اكتب اسمك والكود!");
            myCode = c;
            socket.emit('joinRoom', { roomCode: c, playerName: n });
        }

        socket.on('joinedSuccess', () => { 
            document.getElementById('home').style.display='none'; 
            document.getElementById('playerPanel').style.display='block'; 
        });

        socket.on('updatePlayers', (ps) => { 
            document.getElementById('pList').innerText = "اللاعبين المنضمين: " + ps.map(p=>p.name).join(' - '); 
        });

        // --- وظائف الجيم ---
        function startGame() {
            socket.emit('startGame', { 
                roomCode: myCode, 
                crimeType: document.getElementById('crimeType').value, 
                tricks: document.getElementById('tricks').value 
            });
        }

        socket.on('gameData', (d) => {
            document.getElementById('playerContent').innerHTML = `
                <div class="card">
                    <h2 style="color:gold;">أنت: (${d.charName})</h2>
                    <p>📖 القصة: ${d.story}</p>
                    <p style="background:#222; padding:10px;">🤫 سرك: ${d.charSecret}</p>
                    <h1 style="color:${d.role.includes('🔪') ? 'red' : 'cyan'}">${d.role}</h1>
                </div>`;
            renderVoteButtons(d.allCharNames);
        });

        socket.on('bossData', (d) => {
            document.getElementById('setup').style.display='none';
            document.getElementById('bossInGame').style.display='block';
            document.getElementById('bossStoryDisplay').innerText = d.story;
            document.getElementById('bossSecrets').innerHTML = d.players.map(p=>
                `<p>👤 ${p.name} بشخصية <b>(${p.charName})</b> - دوره: <b>${p.role}</b></p>`
            ).join('');
        });

        // --- نظام التصويت والدلائل ---
        function renderVoteButtons(chars) {
            const container = document.getElementById('vBtns');
            container.innerHTML = "";
            document.getElementById('vUI').style.display = 'block';
            chars.forEach(char => {
                if(char) {
                    const btn = document.createElement('button');
                    btn.className = "vote-btn";
                    btn.innerText = char;
                    btn.onclick = () => cast(char);
                    container.appendChild(btn);
                }
            });
        }

        function cast(charName) {
            socket.emit('castVote', { roomCode: myCode, votedForChar: charName });
            document.getElementById('vUI').style.display = 'none';
            alert("تم تسجيل صوتك ضد: " + charName);
        }

        socket.on('voteResultUpdate', (d) => {
            let s = ""; for(let k in d.details) s += `<p>${k}: ${d.details[k]} أصوات</p>`;
            document.getElementById('vStats').innerHTML = s || "انتظار الأصوات...";
        });

        socket.on('receiveClue', (clue) => {
            const clueDiv = document.getElementById('clueDisplay');
            clueDiv.innerText = "🔍 دليل مادي: " + clue;
            clueDiv.style.display = 'block';
            alert("⚠️ دليل جديد ظهر! ركزوا في كلام البوس.");
        });

        socket.on('panicAction', () => {
            document.body.classList.add('panic-active');
            new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play().catch(()=>{});
            setTimeout(() => document.body.classList.remove('panic-active'), 5000);
        });

        socket.on('executionResult', (d) => {
            alert(d.isMafia ? `✅ مبروك! تم إعدام المافيا (${d.charName}). متبقي ${d.remaining} مافيا.` 
                           : `❌ للأسف.. أعدمتم شخص بريء (${d.charName}). المافيا لسه موجودين!`);
        });

        socket.on('nextRound', (aliveChars) => {
            document.getElementById('clueDisplay').style.display = 'none';
            renderVoteButtons(aliveChars);
        });

        socket.on('gameOver', (msg) => {
            alert(msg);
            location.reload();
        });

        function closeRoom() {
            if(confirm("هل تريد إنهاء اللعبة وإغلاق الغرفة؟")) {
                socket.emit('closeRoom', myCode);
            }
        }
    </script>
</body>
</html>
